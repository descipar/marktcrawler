name: Scraper Health – markt.de

on:
  schedule:
    - cron: '25 3 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install flask requests beautifulsoup4 lxml
      - name: markt.de prüfen
        env:
          DATA_DIR: /tmp
        run: |
          python3 << 'PYEOF'
          import sys, importlib
          SETTINGS = {
              "marktde_max_price": "300",
              "marktde_location": "münchen",
              "marktde_radius": "100",
          }
          mod = importlib.import_module("app.scrapers.markt")
          items = mod.MarktdeScraper(SETTINGS).search("kinderwagen", max_results=3)
          if items:
              print(f"OK: {len(items)} Ergebnisse")
          else:
              print("FAIL: 0 Ergebnisse – CSS-Selektoren möglicherweise veraltet")
              sys.exit(1)
          PYEOF

{% extends "base.html" %}
{% block title_suffix %} – Profil wählen{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-12 text-center">
  <h1 class="text-2xl font-bold text-slate-700 mb-2">Wer bist du?</h1>
  <p class="text-sm text-slate-400 mb-10">Wähle dein Profil – du siehst dann, was seit deinem letzten Besuch neu ist.</p>

  <div class="flex flex-wrap justify-center gap-8 mb-12">
    {% for profile in profiles %}
    <form method="POST" action="/profiles/select/{{ profile.id }}">
      <button type="submit"
        class="group flex flex-col items-center gap-3 cursor-pointer focus:outline-none">
        <div class="w-28 h-28 rounded-full bg-slate-100 border-4 border-transparent
                    group-hover:border-brand-500 group-focus:border-brand-500
                    flex items-center justify-center text-5xl
                    transition-all duration-150 group-hover:scale-105">
          {{ profile.emoji }}
        </div>
        <span class="text-slate-700 font-medium">{{ profile.name }}</span>
        {% if profile.last_seen_at %}
          <span class="text-xs text-slate-400">zuletzt {{ profile.last_seen_at[:16].replace('T',' ') }}</span>
        {% else %}
          <span class="text-xs text-slate-400">noch nie besucht</span>
        {% endif %}
      </button>
    </form>
    {% endfor %}
  </div>

  <a href="/settings#profiles"
    class="inline-flex items-center gap-1.5 text-sm text-slate-400 hover:text-brand-600 transition-colors">
    ⚙️ Profile verwalten
  </a>
</div>
{% endblock %}

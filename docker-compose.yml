version: "3.9"

services:
  baby-crawler:
    build: .
    container_name: baby-crawler
    restart: unless-stopped
    ports:
      - "5000:5000"        # Admin-UI: http://<proxmox-ip>:5000
    volumes:
      - ./data:/data       # SQLite-Datenbank + Facebook-Session persistent
    environment:
      - TZ=Europe/Berlin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍼 Baby-Crawler{% block title_suffix %}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fdf4ff', 100:'#fae8ff', 500:'#a855f7', 600:'#9333ea', 700:'#7e22ce' }
          }
        }
      }
    }
  </script>
  <style>
    .badge-ka   { background:#e8f5e9; color:#2e7d32; }
    .badge-sp   { background:#e3f2fd; color:#1565c0; }
    .badge-fb   { background:#e8eaf6; color:#283593; }
    .badge-idle { background:#f1f5f9; color:#64748b; }
    .badge-run  { background:#fef9c3; color:#854d0e; }
    .listing-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .listing-card { transition: all .15s ease; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; display:inline-block; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="/" class="flex items-center gap-2 font-bold text-lg text-brand-700 hover:text-brand-600">
      🍼 Baby-Crawler
    </a>
    <div class="flex items-center gap-1">
      <a href="/" class="px-3 py-1.5 rounded-md text-sm font-medium
        {% if request.path == '/' %}bg-brand-100 text-brand-700{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        Dashboard
      </a>
      <a href="/settings" class="px-3 py-1.5 rounded-md text-sm font-medium
        {% if request.path == '/settings' %}bg-brand-100 text-brand-700{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
        ⚙️ Einstellungen
      </a>
    </div>
  </div>
</nav>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="max-w-7xl mx-auto px-4 pt-3">
      {% for category, message in messages %}
        <div class="flex items-center gap-2 px-4 py-2 rounded-lg mb-2 text-sm font-medium
          {% if category == 'success' %}bg-green-50 text-green-800 border border-green-200
          {% elif category == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
          {% else %}bg-red-50 text-red-800 border border-red-200{% endif %}">
          {{ message }}
          <button onclick="this.parentElement.remove()" class="ml-auto opacity-60 hover:opacity-100">✕</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main class="max-w-7xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-xs text-slate-400 py-6">
  🍼 Baby-Crawler · Viel Erfolg bei der Suche!
</footer>
</body>
</html>

name: Scraper Health – eBay

on:
  schedule:
    - cron: '5 3 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install requests beautifulsoup4 lxml
      - name: eBay prüfen
        env:
          DATA_DIR: /tmp
        run: |
          python3 << 'PYEOF'
          import sys, importlib
          SETTINGS = {"ebay_max_price": "300", "ebay_request_delay": "0"}
          mod = importlib.import_module("app.scrapers.ebay")
          items = mod.EbayScraper(SETTINGS).search("kinderwagen", max_results=3)
          if items:
              print(f"OK: {len(items)} Ergebnisse")
          else:
              print("FAIL: 0 Ergebnisse – Selektoren möglicherweise veraltet oder geblockt")
              sys.exit(1)
          PYEOF

name: Scraper Health – Shpock

on:
  schedule:
    - cron: '10 3 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install flask requests
      - name: Shpock prüfen
        env:
          DATA_DIR: /tmp
        run: |
          python3 << 'PYEOF'
          import sys, importlib
          SETTINGS = {"shpock_max_price": "300", "shpock_radius": "0"}
          mod = importlib.import_module("app.scrapers.shpock")
          items = mod.ShpockScraper(SETTINGS).search("kinderwagen", max_results=3)
          if items:
              print(f"OK: {len(items)} Ergebnisse")
          else:
              print("FAIL: 0 Ergebnisse – GraphQL-Schema möglicherweise geändert")
              sys.exit(1)
          PYEOF

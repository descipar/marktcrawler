version: "3.9"

services:
  marktcrawler:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
        GIT_DATE: ${GIT_DATE:-}
        GIT_MESSAGE: ${GIT_MESSAGE:-}
    container_name: marktcrawler
    restart: unless-stopped
    ports:
      - "5000:5000"        # Admin-UI: http://<proxmox-ip>:5000
    volumes:
      - ./data:/data       # SQLite-Datenbank + Facebook-Session persistent
    environment:
      - TZ=Europe/Berlin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

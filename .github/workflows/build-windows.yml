name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scraper-check:
    name: Scraper Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flask requests beautifulsoup4 lxml
      - name: Alle Scraper prüfen
        env:
          DATA_DIR: /tmp
        run: |
          python3 << 'PYEOF'
          import sys, time, importlib

          SCRAPERS = [
              ("Kleinanzeigen", "app.scrapers.kleinanzeigen", "KleinanzeigenScraper",
               {"kleinanzeigen_max_price": "300"}),
              ("eBay",          "app.scrapers.ebay",          "EbayScraper",
               {"ebay_max_price": "300", "ebay_request_delay": "0"}),
              ("Shpock",        "app.scrapers.shpock",        "ShpockScraper",
               {"shpock_max_price": "300", "shpock_radius": "0"}),
              ("Vinted",        "app.scrapers.vinted",        "VintedScraper",
               {"vinted_max_price": "300", "vinted_radius": "0", "vinted_max_age_hours": "72"}),
              ("Willhaben",     "app.scrapers.willhaben",     "WillhabenScraper",
               {"willhaben_max_price": "300", "willhaben_paylivery_only": "1"}),
              ("markt.de",      "app.scrapers.markt",         "MarktdeScraper",
               {"marktde_max_price": "300", "marktde_location": "münchen", "marktde_radius": "100"}),
          ]

          failed = []
          for i, (name, module, cls_name, settings) in enumerate(SCRAPERS):
              if i > 0:
                  time.sleep(3)
              try:
                  mod = importlib.import_module(module)
                  items = getattr(mod, cls_name)(settings).search("kinderwagen", max_results=3)
                  if items:
                      print(f"  ok  {name}: {len(items)} Ergebnisse")
                  else:
                      print(f"  FAIL {name}: 0 Ergebnisse")
                      failed.append(name)
              except Exception as e:
                  print(f"  FAIL {name}: {type(e).__name__}: {e}")
                  failed.append(name)

          if failed:
              print(f"\nRelease blockiert – defekte Scraper: {', '.join(failed)}")
              sys.exit(1)
          print(f"\nAlle Scraper OK – Release wird gebaut.")
          PYEOF

  build:
    needs: scraper-check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # vollständige Git-History für bake_version.py

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: App-Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          pip install -r windows/requirements-windows.txt

      - name: _version.py einbrennen
        run: python scripts/bake_version.py

      - name: Icon erzeugen
        run: python windows/create_icon.py

      - name: PyInstaller-Build
        run: pyinstaller windows/marktcrawler.spec --noconfirm

      - name: Inno Setup installieren
        run: choco install innosetup --yes --no-progress

      - name: Installer bauen
        run: iscc windows\installer.iss

      - name: Installer-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: MarktcrawlerSetup
          path: windows\Output\MarktcrawlerSetup.exe
          retention-days: 30

      - name: Als Release-Asset anhängen (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows\Output\MarktcrawlerSetup.exe
          fail_on_unmatched_files: true
